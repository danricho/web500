<!doctype html>
<html lang="en" class="height-100 width-100">
  <head>
    <meta charset="utf-8" />
    <title>Web500 - Choose a Table</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Roboto+Slab:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/vendor/css/normalize.css" />
    <link rel="stylesheet" href="/static/vendor/css/skeleton.css" />
    <link
      rel="icon"
      type="image/png"
      href="/static/images/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg" />
    <link rel="shortcut icon" href="/static/images/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/static/images/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Web500" />
    <link rel="manifest" href="/static/images/site.webmanifest" />
    <link href="/static/layout.css?{{timeNow}}" rel="stylesheet" />
    <link href="/static/styling.css?{{timeNow}}" rel="stylesheet" />
    <script src="/static/svg.js?{{timeNow}}"></script>
    <style>
      /* NO jQuery/SOCKET.IO - PLAIN VANILLA JS RE-RENDERS #table-list EVERY 3s
         (SEE THE SCRIPT BELOW), SO SEATS TAKEN BY OTHERS DON'T GO STALE HERE */
      .table-list {
        text-align: left;
        margin: 1.5rem 0;
      }
      /* fieldset PER TABLE - LEGEND IS THE TABLE NAME (SET IN renderTables()) */
      .table-row {
        min-width: 0;
        padding: 0.6rem 0.8rem;
        margin: 0.4rem 0;
        border: 1px solid var(--primary-color);
        border-radius: 8px;
      }
      .table-row-body {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .table-row form {
        margin: 0;
        flex-shrink: 0;
      }
      .table-row button {
        margin: 0;
      }
    </style>
  </head>

  <body class="height-100 width-100">
    <div class="pos-rel height-100 width-100">
      <div class="bg-cross-pattern height-100 width-100"></div>

      <div class="pos-abs top-left text-center height-100 width-100 z-lobby">
        <div class="pos-rel top-left height-100 width-100">
          <div
            class="pos-abs middle-center light-on-darker border-rounded enable-mouse modal-box modal-box-border"
          >
            <div>
              <svg
                version="1.1"
                xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                x="0px"
                y="0px"
                viewBox="0 0 100 73.54"
                style="width: 80px"
                fill="currentColor"
              >
                <path
                  d="M99.7,0.02H82.04c-0.37,0-0.71,0.22-0.86,0.56l-14.71,34.1c-0.19,0.44-0.79,0.52-1.08,0.13L50.3,14.92
                c-0.15-0.2-0.45-0.2-0.6,0L34.61,34.81c-0.29,0.38-0.89,0.31-1.08-0.13L18.82,0.58c-0.15-0.34-0.48-0.56-0.86-0.56H0.3
                c-0.14,0-0.24,0.15-0.18,0.28l31.15,72.86c0.1,0.23,0.33,0.39,0.58,0.39h8.71c0.25,0,0.48-0.12,0.63-0.32l5.17-7.11
                c0,0-6.09,2.19-8.97-2.26c-3.05-4.71,0.63-8.79,0.63-8.79l11.42-14.27c0.29-0.36,0.83-0.36,1.12,0l11.42,14.27
                c0,0,3.68,4.08,0.63,8.79c-2.88,4.45-8.97,2.26-8.97,2.26l5.17,7.11c0.15,0.2,0.38,0.32,0.63,0.32h8.71c0.25,0,0.48-0.15,0.58-0.39
                L99.88,0.29C99.94,0.16,99.84,0.02,99.7,0.02z"
                />
              </svg>
              <div style="font-size: 4rem; font-weight: bold">
                <!-- prettier-ignore -->
                Web<span style="color: var(--primary-color)">500</span>
              </div>
            </div>
            <h5 class="my-3">Choose a Table, {{ session_username }}</h5>

            <div class="table-list my-5" id="table-list">
              <p class="italic">Loading tables...</p>
            </div>

            <form
              method="get"
              action="/api/create_table"
              style="margin-bottom: 1rem"
            >
              <button type="submit">CREATE NEW TABLE</button>
            </form>

            <form method="get" action="/logout" style="margin-bottom: 1rem">
              <button type="submit" class="button-small mt-2">LOG OUT</button
              ><br />
              <small> Logged in as {{ session_username }} </small>
            </form>

            <div class="modal-meta">
              <small>
                Created by
                <a href="https://danricho.com" target="_blank">danricho</a> in
                2022, then 2026<br />{{ version }} -
                <a href="https://github.com/danricho/web500" target="_blank"
                  >GitHub</a
                >
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // PLAIN VANILLA JS (NO jQuery, NO SOCKET.IO - THIS PAGE STAYS DELIBERATELY
      // LIGHT, SAME SPIRIT AS login.j2.html). RENDERS THE TABLE LIST ONCE FROM
      // INITIAL_TABLES (A SERVER-EMBEDDED SNAPSHOT - AVOIDS AN IMMEDIATE REDUNDANT
      // FETCH RIGHT AFTER THE PAGE ALREADY HAD THE DATA), THEN RE-FETCHES /api/tables
      // EVERY FEW SECONDS SO SEAT CHANGES MADE BY OTHERS WHILE THIS PAGE SITS OPEN
      // DON'T GO STALE.
      var INITIAL_TABLES = {{ tables | tojson }};

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }
      // BOT NAMES ARRIVE AS "B|Name" / DEV TEST-MODE BOTS AS "D|NAME" - SAME
      // SCHEME AND SAME SVG MARKUP AS displayName() IN game_client.js, SHARED
      // VIA svg.js's PREFIX_ICON_SVG/replacePrefixIcons() (THIS PAGE CAN LOAD
      // THAT FILE EVEN WITHOUT jQuery - ITS PLUGIN BITS ARE GUARDED). ICON SIZE
      // IS THE ONLY THING THAT DIFFERS HERE, VIA THE .bot-icon CSS OVERRIDE
      // ABOVE, NOT A FORKED SVG.
      function displayName(name) {
        if (!name) return "—";
        return replacePrefixIcons(escapeHtml(name));
      }

      function renderTables(list) {
        var container = document.getElementById("table-list");
        if (list.length === 0) {
          container.innerHTML =
            '<p class="italic" style="text-align: center;">No tables yet - create the first one below.</p>';
          return;
        }
        var html = "";
        list.forEach(function (t) {
          var seats =
            "Team 1: " + displayName(t.players[0]) + ", " + displayName(t.players[2]) + "<br>" +
            "Team 2: " + displayName(t.players[1]) + ", " + displayName(t.players[3]);
          var action;
          if (t.already_seated || !t.full) {
            action =
              '<form method="get" action="/api/select_table">' +
              '<input type="hidden" name="id" value="' + escapeHtml(t.name) + '">' +
              '<button type="submit" class="button-success">' +
              (t.already_seated ? "REJOIN" : "JOIN") +
              "</button></form>";
          } else {
            action = '<span class="italic" style="opacity: 0.7">FULL</span>';
          }
          html +=
            '<fieldset class="table-row"><legend class="bold" style="color: var(--primary-color-light); background-color: var(--bg-darker); padding: 0 1rem; margin-bottom: -1rem;">' +
            escapeHtml(t.name) +
            "</legend>" +
            '<div class="table-row-body"><div>' +
            '<small class="italic">(' + escapeHtml(t.state) + ")</small>" +
            '<div class="table-seats"><small>' + seats + "</small></div></div>" + action + "</div></fieldset>";
        });
        container.innerHTML = html;
      }
      function refreshTables() {
        fetch("/api/tables")
          .then(function (r) { return r.json(); })
          .then(renderTables)
          .catch(function () {}); // a transient fetch failure just skips this refresh
      }
      renderTables(INITIAL_TABLES);
      setInterval(refreshTables, 3000);
    </script>
  </body>
</html>
